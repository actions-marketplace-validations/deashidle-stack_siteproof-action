name: 'SiteProof Website Quality Scanner'
description: 'Scan websites for WCAG accessibility, UX quality, and AI-readiness (AEO). Get structured fix recipes with SiteProof API.'
branding:
  icon: 'eye'
  color: 'purple'

inputs:
  url:
    description: 'URL to scan (must be publicly accessible)'
    required: true
  api-key:
    description: 'SiteProof API key (sp_live_xxx or sp_test_xxx)'
    required: true
  threshold:
    description: 'Minimum score to pass (0-100). Only used when fail-on is "score".'
    required: false
    default: '0'
  fail-on:
    description: 'When to fail the check: critical, serious, any, score, none'
    required: false
    default: 'none'
  comment:
    description: 'Post results as a PR comment (true/false)'
    required: false
    default: 'true'
  recipe:
    description: 'Include fix recipes in output (Pro tier only)'
    required: false
    default: 'false'
  aeo:
    description: 'Include AI Engine Optimization (AEO) scan results (true/false)'
    required: false
    default: 'false'
  api-url:
    description: 'SiteProof API base URL (override for testing)'
    required: false
    default: 'https://siteproof-public-api.andreas-everform.workers.dev'

outputs:
  score:
    description: 'Overall quality score (0-100)'
    value: ${{ steps.scan.outputs.score }}
  grade:
    description: 'Grade (A-F)'
    value: ${{ steps.scan.outputs.grade }}
  issues:
    description: 'Number of issues found'
    value: ${{ steps.scan.outputs.issues }}
  passed:
    description: 'Whether the check passed (true/false)'
    value: ${{ steps.scan.outputs.passed }}
  wcag-score:
    description: 'WCAG accessibility score (0-100)'
    value: ${{ steps.scan.outputs.wcag-score }}
  ux-score:
    description: 'UX quality score (0-100)'
    value: ${{ steps.scan.outputs.ux-score }}
  aeo-score:
    description: 'AI Engine Optimization score (0-100)'
    value: ${{ steps.scan.outputs.aeo-score }}
  aeo-grade:
    description: 'AEO grade (A-F)'
    value: ${{ steps.scan.outputs.aeo-grade }}

runs:
  using: 'composite'
  steps:
    - name: Run SiteProof Scan
      id: scan
      shell: bash
      run: bash "${{ github.action_path }}/scripts/scan.sh"
      env:
        INPUT_URL: ${{ inputs.url }}
        INPUT_API_KEY: ${{ inputs.api-key }}
        INPUT_THRESHOLD: ${{ inputs.threshold }}
        INPUT_FAIL_ON: ${{ inputs.fail-on }}
        INPUT_COMMENT: ${{ inputs.comment }}
        INPUT_RECIPE: ${{ inputs.recipe }}
        INPUT_AEO: ${{ inputs.aeo }}
        INPUT_API_URL: ${{ inputs.api-url }}
        GITHUB_TOKEN: ${{ github.token }}
